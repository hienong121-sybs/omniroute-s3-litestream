services:
  omniroute:
    image: diegosouzapw/omniroute:latest
    restart: unless-stopped
    stop_grace_period: 40s
    env_file: .env
    environment:
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-http://localhost:20128}
    ports:
      - "20128:${OMNIROUTE_PORT:-20128}"
    volumes:
      - ./data:/app/data
    depends_on:
      litestream:
        condition: service_healthy # ✅ Chờ litestream healthy

  litestream:
    image: litestream/litestream:latest
    restart: unless-stopped
    env_file: .env
    environment:
      - LITESTREAM_BUCKET=${LITESTREAM_BUCKET}
      - LITESTREAM_ACCESS_KEY_ID=${LITESTREAM_ACCESS_KEY_ID}
      - LITESTREAM_SECRET_ACCESS_KEY=${LITESTREAM_SECRET_ACCESS_KEY}
      - SUPABASE_PROJECT_REF=${SUPABASE_PROJECT_REF}
    volumes:
      - ./data:/app/data
      - ./litestream/litestream.yml:/etc/litestream.yml
      - ./litestream/startup.sh:/startup.sh
    entrypoint: ["/bin/sh", "/startup.sh"]
    healthcheck:
      test: ["CMD", "litestream", "databases"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
